name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate (typecheck, lint, tests + coverage ≥90%, build)
        run: npm run validate
      - name: Verify package contents
        run: npm pack --dry-run --ignore-scripts
