name: Release

# Publishes to npm using trusted publishing (OIDC) + provenance — no long-lived
# NPM_TOKEN in CI (TDR §5.6, ADR 0009). Configure this repo as a trusted
# publisher for the package on npmjs.com first. Triggers on a version tag.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      # Trusted publishing requires a recent npm.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck && npm test && npm run build
      # `provenance: true` and `access: public` come from package.json
      # publishConfig; no NPM_TOKEN needed with trusted publishing.
      - run: npm publish
